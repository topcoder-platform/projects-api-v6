packages:
  - .

allowBuilds:
  '@nestjs/core': true
  '@prisma/engines': true
  '@scarf/scarf': false
  '@swc/core': true
  prisma: true

# The Topcoder wrappers intentionally resolve the core library from Git.
# Preserve that established dependency graph under pnpm's stricter defaults.
blockExoticSubdeps: false

overrides:
  '@topcoder-platform/topcoder-bus-api-wrapper>tc-core-library-js': https://codeload.github.com/topcoder-platform/tc-core-library-js/tar.gz/1075136355e1e1c4779f2138a30f3ffbd718bfa4
  '@hono/node-server@<1.19.13': 1.19.14
  '@nestjs/core@<=11.1.17': 11.1.28
  ajv: 8.18.0
  'axios@<1.18.1': 1.18.1
  'brace-expansion@>=1.0.0 <2.0.0': 1.1.16
  'brace-expansion@>=2.0.0 <3.0.0': 2.1.2
  'brace-expansion@>=5.0.0 <5.0.6': 5.0.6
  'defu@<=6.1.4': 6.1.5
  'effect@<3.20.0': 3.20.0
  'fast-uri@<3.1.2': 3.1.2
  'fast-xml-parser@<5.7.0': 5.10.1
  'file-type@>=20.0.0 <21.3.2': 21.3.2
  'follow-redirects@<1.16.0': 1.16.0
  'form-data@>=4.0.0 <4.0.6': 4.0.6
  'hono@<4.12.25': 4.12.31
  'js-yaml@>=4.0.0 <4.1.2': 4.3.0
  'joi@>=18.0.0 <18.2.1': 18.2.3
  jws: '>=3.2.3 <4.0.0 || >=4.0.1'
  'lodash@<4.18.1': 4.18.1
  minimatch: 10.2.4
  'multer@<2.2.0': 2.2.0
  'path-to-regexp@>=8.0.0 <8.4.0': 8.4.2
  'picomatch@>=2.0.0 <2.3.2': 2.3.2
  'picomatch@>=4.0.0 <4.0.4': 4.0.4
  'qs@<6.15.2': 6.15.3
  'serialize-javascript@<7.0.5': 7.0.7

patchedDependencies:
  '@eslint/eslintrc@3.3.3': patches/@eslint__eslintrc@3.3.3.patch
  'eslint@9.39.2': patches/eslint@9.39.2.patch
